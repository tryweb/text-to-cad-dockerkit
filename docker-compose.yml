services:
  cad-workbench:
    # Production image from GitHub Container Registry.
    # For local development, use docker-compose.dev.yml:
    #   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
    image: ghcr.io/${IMAGE_NAMESPACE:-tryweb/text-to-cad-dockerkit}:${IMAGE_TAG:-latest}
    container_name: cad-workbench
    restart: unless-stopped
    environment:
      - LOCAL_UID=${LOCAL_UID:-1000}
      - LOCAL_GID=${LOCAL_GID:-1000}
      - OPENCHAMBER_PORT=${OPENCHAMBER_PORT:-3000}
      - VIEWER_HOST_PORT=${VIEWER_HOST_PORT:-3002}
      # Root entrypoint → $HOME=/root by default; force it so opencode writes auth.json into the volumes below.
      - HOME=/home/opencode
    ports:
      - "${OPENCHAMBER_PORT:-3000}:${OPENCHAMBER_PORT:-3000}"
      - "${VIEWER_HOST_PORT:-3002}:${VIEWER_HOST_PORT:-3002}"
    volumes:
      - "${WORKSPACE_VOLUME_NAME:-cad-workbench-workspace}:/workspace"
      # Persist opencode auth, config, and cache so re-login isn't needed across rebuilds.
      - "opencode-data:/home/opencode/.local/share/opencode"
      - "opencode-config:/home/opencode/.config/opencode"
      - "opencode-cache:/home/opencode/.cache/opencode"
      - "lean-ctx-data:/home/opencode/.local/share/lean-ctx"
      - "lean-ctx-state:/home/opencode/.local/state/lean-ctx"
      # Persist OpenChamber settings (default project, theme, etc.) across restarts.
      - "openchamber-config:/home/opencode/.config/openchamber"
    stdin_open: true
    tty: true

volumes:
  cad-workbench-workspace:
    name: ${WORKSPACE_VOLUME_NAME:-cad-workbench-workspace}
  opencode-data:
    name: cad-workbench-opencode-data
  opencode-config:
    name: cad-workbench-opencode-config
  opencode-cache:
    name: cad-workbench-opencode-cache
  lean-ctx-data:
    name: cad-workbench-lean-ctx-data
  lean-ctx-state:
    name: cad-workbench-lean-ctx-state
  openchamber-config:
    name: cad-workbench-openchamber-config
