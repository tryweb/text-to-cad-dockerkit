name: CI

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Image
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          outputs: type=docker,dest=/tmp/image.tar
          tags: text-to-cad-workbench:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: image
          path: /tmp/image.tar
          retention-days: 7

  test:
    name: Integration Tests
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Start services with CI image
        run: |
          cat > docker-compose.override.yml << 'EOF'
          services:
            cad-workbench:
              image: text-to-cad-workbench:ci
          EOF
          docker compose -f docker-compose.yml -f docker-compose.dev.yml -f docker-compose.override.yml up -d
          echo "Waiting for services to start..."
          sleep 60

      - name: Run verification
        run: |
          chmod +x scripts/verify.sh
          COMPOSE_FILE="docker-compose.yml:docker-compose.dev.yml:docker-compose.override.yml" ./scripts/verify.sh

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.dev.yml logs cad-workbench || true
          docker compose -f docker-compose.yml -f docker-compose.dev.yml ps || true

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.dev.yml down -v --remove-orphans || true

  push:
    name: Push to GHCR
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: image
          path: /tmp

      - name: Load image
        run: docker load -i /tmp/image.tar

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push
        run: |
          IMAGE="${{ env.REGISTRY }}/${GITHUB_REPOSITORY,,}"
          docker tag text-to-cad-workbench:ci "${IMAGE}:${{ github.ref_name }}"
          docker tag text-to-cad-workbench:ci "${IMAGE}:sha-${{ github.sha }}"
          docker tag text-to-cad-workbench:ci "${IMAGE}:latest"
          docker push --all-tags "${IMAGE}"
          echo "::notice::Pushed ${IMAGE}:${{ github.ref_name }}"

  release:
    name: Create Release
    needs: [push, test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate Release Body
        id: body
        run: |
          CURRENT_TAG="${{ github.ref_name }}"

          PREV_TAG=$(git tag --sort=-version:refname | \
            grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | \
            grep -v "^${CURRENT_TAG}$" | \
            head -1 || true)

          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --no-merges | head -50)
            SINCE_TAG="first release"
          else
            CHANGELOG=$(git log "${PREV_TAG}..HEAD" --oneline --no-merges | head -50)
            SINCE_TAG="${PREV_TAG}"
          fi

          {
            echo 'body<<RELEASE_BODY_EOF'
            echo '## Docker Image'
            echo ''
            echo '```bash'
            echo "docker pull ghcr.io/${GITHUB_REPOSITORY,,}:${{ github.ref_name }}"
            echo '```'
            echo ''
            echo '## Quick Start'
            echo ''
            echo '```bash'
            echo 'cp .env.example .env'
            echo 'docker compose up -d'
            echo '```'
            echo ''
            echo '## Changes (since '"${SINCE_TAG}"')'
            echo ''
            echo "$CHANGELOG"
            echo ''
            echo '---'
            echo '*Generated by GitHub Actions*'
            echo 'RELEASE_BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.body.outputs.body }}
