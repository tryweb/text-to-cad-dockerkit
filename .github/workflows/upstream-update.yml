name: Upstream Update Check

on:
  schedule:
    - cron: '30 23 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: Specific text-to-cad release tag to validate and propose
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: upstream-update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Check all pinned versions in Dockerfile against upstream
  # ---------------------------------------------------------------------------
  check-versions:
    name: Check Upstream Versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      updates-needed: ${{ steps.check.outputs.updates-needed }}
      dockerfile-changes-needed: ${{ steps.check.outputs.dockerfile-changes-needed }}
      pinned-updates: ${{ steps.check.outputs.pinned-updates }}
    steps:
      - uses: actions/checkout@v7

      - name: Download previous version snapshot
        id: prev-snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          LAST_RUN=$(gh run list --workflow upstream-update.yml --branch main \
            --status success --json databaseId --jq '.[0].databaseId' 2>/dev/null || echo "")
          if [[ -n "$LAST_RUN" ]]; then
            gh run download "$LAST_RUN" -n version-snapshot --dir . 2>/dev/null || true
          fi
          if [[ -f "version-snapshot.json" ]]; then
            echo "snapshot-found=true" >> "$GITHUB_OUTPUT"
          else
            echo "snapshot-found=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No previous version snapshot found (first run or no prior successful runs)"
          fi

      - name: Check all dependency versions
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_VERSION: ${{ github.event.inputs.version || '' }}
        run: |
          set -euo pipefail

          # --- Helper functions ---
          json_quote() {
            python3 -c 'import json,sys; print(json.dumps(sys.argv[1]))' "$1"
          }
          warn() { printf '::warning::%s\n' "$*" >&2; }

          get_github_tag() {
            local repo="$1" raw=""
            if command -v gh >/dev/null 2>&1; then
              raw="$(gh release view --repo "$repo" --json tagName --jq .tagName 2>/dev/null || true)"
            fi
            raw="$(printf '%s' "$raw" | tr -d '\r' | awk 'NF{print; exit}')"
            if [[ -z "$raw" ]]; then printf 'unknown\n'; return 0; fi
            raw="${raw#v}"
            if [[ "$raw" =~ ^[0-9]+([.][0-9]+)*([-.][0-9A-Za-z]+)*$ ]]; then
              printf '%s\n' "$raw"
            else
              printf 'unknown\n'
            fi
          }

          get_npm_version() {
            local pkg="$1" version=""
            version="$(timeout 10 npm view "$pkg" version 2>/dev/null || true)"
            version="$(printf '%s' "$version" | tr -d '\r' | awk 'NF{print; exit}')"
            if [[ -z "$version" ]]; then printf 'unknown\n'; return 0; fi
            if [[ "$version" =~ ^[0-9A-Za-z]+([.-][0-9A-Za-z]+)*$ ]]; then
              printf '%s\n' "$version"
            else
              printf 'unknown\n'
            fi
          }

          version_gt() {
            local current="$1" latest="$2"
            [[ -n "$current" && -n "$latest" && "$current" != "unknown" && "$latest" != "unknown" ]] || return 1
            local max
            max="$(printf '%s\n%s\n' "$current" "$latest" | sort -V | tail -n1)"
            [[ "$max" == "$latest" && "$current" != "$latest" ]]
          }

          # --- Parse Dockerfile pinned ARGs ---
          declare -A PINNED_MAP=()
          while IFS='=' read -r name ver; do
            case "$name" in
              TEXT_TO_CAD_VERSION|OPENCODE_AI_VERSION|TTYD_VERSION)
                PINNED_MAP["$name"]="$ver"
                ;;
            esac
          done < <(grep -oP '^ARG \K\w+=[0-9][0-9.-]*' Dockerfile | sed 's/=/ /' | awk '{print $1"="$2}')

          # --- Check each against upstream ---
          dockerfile_changes_needed=false
          check_failures=0
          pinned_updates_lines=()

          for name in "${!PINNED_MAP[@]}"; do
            current="${PINNED_MAP[$name]}"
            latest="unknown"
            source=""

            case "$name" in
              TEXT_TO_CAD_VERSION)
                source='earthtojake/text-to-cad'
                if [[ -n "$REQUESTED_VERSION" ]]; then
                  latest="$REQUESTED_VERSION"
                else
                  latest="$(get_github_tag "$source")"
                fi
                ;;
              OPENCODE_AI_VERSION)
                source='opencode-ai'
                latest="$(get_npm_version "$source")"
                ;;
              TTYD_VERSION)
                source='tsl0922/ttyd'
                latest="$(get_github_tag "$source")"
                ;;
            esac

            if [[ "$latest" == "unknown" ]]; then
              warn "Could not resolve latest version for $name from $source"
              check_failures=$((check_failures + 1))
              PINNED_MAP["${name}_latest"]="unknown"
              PINNED_MAP["${name}_source"]="$source"
              continue
            fi

            PINNED_MAP["${name}_latest"]="$latest"
            PINNED_MAP["${name}_source"]="$source"

            if version_gt "$current" "$latest"; then
              dockerfile_changes_needed=true
              pinned_updates_lines+=("$(printf '%s\t%s\t%s\t%s\t%s' "$name" "$current" "$latest" "$source" "changed")")
              echo "::notice::$name: $current -> $latest (from $source)"
            else
              echo "::notice::$name: $current is current (latest: $latest)"
            fi
          done

          # --- Build JSON output ---
          pinned_updates_json="[]"
          if [[ "${#pinned_updates_lines[@]}" -gt 0 ]]; then
            pinned_updates_json="$(
              printf '%s\n' "${pinned_updates_lines[@]}" | jq -Rnc \
                '[inputs | select(length>0) | split("\t") | {name: .[0], current: .[1], latest: .[2], source: .[3], status: .[4]}]'
            )"
          fi

          # --- Write version snapshot ---
          {
            printf '{\n'
            printf '  "timestamp": "%s",\n' "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            printf '  "pinned": {\n'
            first=true
            for name in TEXT_TO_CAD_VERSION OPENCODE_AI_VERSION TTYD_VERSION; do
              if [[ -n "${PINNED_MAP[$name]:-}" ]]; then
                if [[ "$first" == true ]]; then first=false; else printf ',\n'; fi
                printf '    "%s": %s' "$name" "$(json_quote "${PINNED_MAP[$name]}")"
              fi
            done
            printf '\n  }\n'
            printf '}\n'
          } > version-snapshot.json

          # --- Set outputs ---
          updates_needed="$dockerfile_changes_needed"

          echo "updates-needed=$updates_needed" >> "$GITHUB_OUTPUT"
          echo "dockerfile-changes-needed=$dockerfile_changes_needed" >> "$GITHUB_OUTPUT"
          echo "pinned-updates=$pinned_updates_json" >> "$GITHUB_OUTPUT"

          echo "::notice::updates-needed=$updates_needed dockerfile-changes=$dockerfile_changes_needed"

      - name: Upload version snapshot
        uses: actions/upload-artifact@v7
        with:
          name: version-snapshot
          path: version-snapshot.json
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Job 2: Build and verify updated image
  # ---------------------------------------------------------------------------
  build-and-verify:
    name: Build and Verify
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: check-versions
    if: needs.check-versions.outputs.dockerfile-changes-needed == 'true'
    steps:
      - uses: actions/checkout@v7

      - name: Prepare build args
        id: build-args
        run: |
          set -euo pipefail
          ARGS=""
          PINNED='${{ needs.check-versions.outputs.pinned-updates }}'
          if [[ "$PINNED" != "[]" && -n "$PINNED" ]]; then
            while IFS= read -r item; do
              name="$(echo "$item" | jq -r '.name')"
              latest="$(echo "$item" | jq -r '.latest')"
              if [[ -n "$name" && -n "$latest" && "$latest" != "null" ]]; then
                ARGS="${ARGS} --build-arg ${name}=${latest}"
              fi
            done < <(echo "$PINNED" | jq -c '.[]')
          fi
          echo "args=${ARGS}" >> "$GITHUB_OUTPUT"

      - name: Build test environment
        run: |
          set -euo pipefail
          docker compose build --no-cache ${{ steps.build-args.outputs.args }}

      - name: Start test environment
        run: |
          set -euo pipefail
          docker compose up -d

      - name: Verify functionality
        run: |
          set -euo pipefail
          ./scripts/verify.sh

      - name: Tear down test environment
        if: always()
        run: |
          set -euo pipefail
          docker compose down -v

  # ---------------------------------------------------------------------------
  # Job 3: Create pull request with updated versions
  # ---------------------------------------------------------------------------
  create-pull-request:
    name: Create Pull Request
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - check-versions
      - build-and-verify
    if: needs.check-versions.outputs.dockerfile-changes-needed == 'true' && needs.build-and-verify.result == 'success'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - name: Update Dockerfile version ARGs
        id: update
        run: |
          set -euo pipefail
          PINNED='${{ needs.check-versions.outputs.pinned-updates }}'
          SUMMARY=""

          while IFS= read -r item; do
            name="$(echo "$item" | jq -r '.name')"
            current="$(echo "$item" | jq -r '.current')"
            latest="$(echo "$item" | jq -r '.latest')"
            source="$(echo "$item" | jq -r '.source')"
            if [[ -n "$name" && -n "$latest" && "$latest" != "null" ]]; then
              sed -i "s/^ARG ${name}=.*/ARG ${name}=${latest}/" Dockerfile
              SUMMARY="${SUMMARY}- **${name}**: \`${current}\` → \`${latest}\` (source: ${source})\n"
              echo "::notice::Updated $name: $current -> $latest"
            fi
          done < <(echo "$PINNED" | jq -c '.[]')

          {
            echo 'summary<<EOF'
            echo -e "$SUMMARY"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ github.token }}
          base: ${{ github.event.repository.default_branch }}
          branch: chore/update-upstream-deps-${{ github.run_id }}
          delete-branch: true
          commit-message: 'chore: update upstream pinned dependencies'
          title: 'chore: update upstream pinned dependencies'
          body: |
            ## Summary

            ${{ steps.update.outputs.summary }}

            ## Validation

            - `docker compose build --no-cache` with updated build args
            - `docker compose up -d`
            - `./scripts/verify.sh`
          labels: dependencies
